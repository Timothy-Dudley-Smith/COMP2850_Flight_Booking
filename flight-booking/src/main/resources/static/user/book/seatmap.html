<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Seats</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../home/styles/style.css">
</head>
<body>

<header class="header">
    <nav class="top-nav">
        <div class="left-nav">
            <div class="logo">
                <img src="/images/Logo.png" class="Airline_Logo">
                <img src="/images/Star_Alliance.jpg" class="Star_Alliance">
            </div>
        </div>
        <div class="center-nav">
            <a href="/">Home</a>
            <a href="/recommendations">Recommendations</a>
            <a href="/book">Book</a>
            <a href="/manage">Manage</a>
        </div>
        <div class="right-nav">
            <span class="lang">United Kingdom - EN</span>
            <a href="/log_in">Log In</a>
        </div>
    </nav>
</header>

<div class="seat-page">
    <h2>Select Your Seats</h2>
    <p class="selected-label" id="seat-help-label" style="margin-bottom: 20px;">Choose one seat for each passenger.</p>

    <!-- column letters A B C | gap | D E F -->
    <div class="col-labels">
        <div class="col-label">A</div>
        <div class="col-label">B</div>
        <div class="col-label">C</div>
        <div class="col-label"></div>
        <div class="col-label">D</div>
        <div class="col-label">E</div>
        <div class="col-label">F</div>
    </div>

    <!-- JS fills this with rows -->
    <div id="seat-map"></div>

    <!-- colour key -->
    <div class="key">
        <div class="key-item"><div class="key-box taken"></div>Taken</div>
        <div class="key-item"><div class="key-box available"></div>Available</div>
        <div class="key-item"><div class="key-box selected"></div>Selected</div>
        <div class="key-item"><div class="key-box exit"></div>Exit row</div>
    </div>

    <!-- shows selected seat e.g. "Selected: Seat 4A" -->
    <p class="selected-label" id="selected-label">No seat selected</p>

    <!-- greyed out until a seat is picked -->
    <button class="continue-btn" id="continue-btn">Continue</button>
</div>






<script>
    const columns = ['A','B','C','D','E','F'];
    const EXIT_ROWS = [9];
    let selectedSeat = null;
    const seatMap = document.getElementById('seat-map');

    const urlParams = new URLSearchParams(window.location.search);
    const fromParam       = urlParams.get('from');
    const toParam         = urlParams.get('to');
    const dateParam       = urlParams.get('date');
    const passengersParam = urlParams.get('passengers');
    const cabinParam      = urlParams.get('cabin');
    const priceParam      = urlParams.get('price');
    const flightId        = urlParams.get('flightId');

    // Fetch real seat data from backend
    async function loadSeats() {
        const response = await fetch(`/api/seats?flightId=${flightId}`);
        const seats = await response.json();

        // Build a lookup: seatNumber -> isAvailable
        const seatLookup = {};
        seats.forEach(s => { seatLookup[s.seatNumber] = s.isAvailable; });

        for (let rowNum = 1; rowNum <= 12; rowNum++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'seat-row';

            for (let seatIndex = 0; seatIndex < 6; seatIndex++) {
                if (seatIndex === 3) {
                    const rowNumber = document.createElement('div');
                    rowNumber.className = 'row-num';
                    rowNumber.textContent = rowNum;
                    rowDiv.append(rowNumber);
                }

                const seatId = rowNum + columns[seatIndex];
                const isExitRow = EXIT_ROWS.includes(rowNum);
                const isAvailable = seatLookup[seatId] === true;

                const seatButton = document.createElement('button');

                if (isExitRow) {
                    seatButton.className = 'seat exit-seat';
                } else if (!isAvailable) {
                    seatButton.className = 'seat taken';
                } else {
                    seatButton.className = 'seat available';
                    seatButton.addEventListener('click', function () {
                        document.querySelectorAll('.seat.selected').forEach(s => {
                            s.classList.remove('selected');
                            s.classList.add('available');
                        });
                        if (selectedSeat === seatId) {
                            selectedSeat = null;
                        } else {
                            seatButton.classList.remove('available');
                            seatButton.classList.add('selected');
                            selectedSeat = seatId;
                        }
                        updateUI();
                    });
                }

                rowDiv.append(seatButton);
            }
            seatMap.append(rowDiv);
        }
    }

    function updateUI() {
        const labelElement = document.getElementById('selected-label');
        const continueButton = document.getElementById('continue-btn');
        if (selectedSeat !== null) {
            labelElement.textContent = 'Selected: Seat ' + selectedSeat;
            continueButton.classList.add('active');
        } else {
            labelElement.textContent = 'No seat selected';
            continueButton.classList.remove('active');
        }
    }

    document.getElementById('continue-btn').addEventListener('click', async function () {
        if (selectedSeat === null) return;

        const user = JSON.parse(sessionStorage.getItem('user'));
        const userId = user?.userId;

        // 1. Create the booking
        const bookingRes = await fetch('/api/bookings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                userId: userId,
                flightId: flightId,
                seatNumbers: [selectedSeat]
            })
        });

        if (!bookingRes.ok) {
            alert('Failed to book seat. Please try again.');
            return;
        }

        const booking = await bookingRes.json();

        // 2. Save passengers linked to the new bookingId
        const passengerData = JSON.parse(sessionStorage.getItem('passengerData') || '[]');
        if (passengerData.length > 0) {
            await fetch('/api/passengers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    bookingId: booking.bookingId,
                    passengers: passengerData
                })
            });
        }

        // 3. Navigate to next page
        window.location.href = `/loyalty?from=${encodeURIComponent(fromParam)}&to=${encodeURIComponent(toParam)}&date=${encodeURIComponent(dateParam)}&passengers=${passengersParam}&cabin=${encodeURIComponent(cabinParam)}&price=${priceParam}&seat=${encodeURIComponent(selectedSeat)}&bookingId=${booking.bookingId}`;
    });

    loadSeats();
</script>

</body>
</html>
