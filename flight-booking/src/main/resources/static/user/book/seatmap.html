<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Seats</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../home/styles/style.css">
</head>
<body>

<header class="header">
    <nav class="top-nav">
        <div class="left-nav">
            <div class="logo">
                <img src="/images/Logo.png" class="Airline_Logo">
                <img src="/images/Star_Alliance.jpg" class="Star_Alliance">
            </div>
        </div>
        <div class="center-nav">
            <a href="/">Home</a>
            <a href="/recommendations">Recommendations</a>
            <a href="/book">Book</a>
            <a href="/manage">Manage</a>
        </div>
        <div class="right-nav">
            <span class="lang">United Kingdom - EN</span>
            <span id="welcome-message"></span>
            <a href="/log_in" id="login-link">Log In</a>
            <button id="logout-button" type="button" style="display: none;">Log Out</button>
        </div>
    </nav>
</header>

<div class="seat-page">
    <h2>Select Your Seats</h2>
    <p class="selected-label" id="seat-help-label" style="margin-bottom: 20px;">Choose one seat for each passenger.</p>

    <!-- column letters A B C | gap | D E F -->
    <div class="col-labels">
        <div class="col-label">A</div>
        <div class="col-label">B</div>
        <div class="col-label">C</div>
        <div class="col-label"></div>
        <div class="col-label">D</div>
        <div class="col-label">E</div>
        <div class="col-label">F</div>
    </div>

    <!-- JS fills this with rows -->
    <div id="seat-map"></div>

    <!-- colour key -->
    <div class="key">
        <div class="key-item"><div class="key-box taken"></div>Taken</div>
        <div class="key-item"><div class="key-box available"></div>Available</div>
        <div class="key-item"><div class="key-box selected"></div>Selected</div>
        <div class="key-item"><div class="key-box exit"></div>Exit row</div>
    </div>

    <!-- shows selected seat e.g. "Selected: Seat 4A" -->
    <p class="selected-label" id="selected-label">No seat selected</p>
    <p class="selected-label" id="hold-message" style="color: #c0392b; min-height: 24px;"></p>

    <!-- greyed out until a seat is picked -->
    <button class="continue-btn" id="continue-btn">Continue</button>
</div>






<script>
    const bookingDraftRaw = sessionStorage.getItem("bookingDraft");
    let bookingDraft = bookingDraftRaw ? JSON.parse(bookingDraftRaw) : null;
    const seatMap = document.getElementById("seat-map");
    const continueButton = document.getElementById("continue-btn");
    const selectedLabel = document.getElementById("selected-label");
    const helpLabel = document.getElementById("seat-help-label");
    const holdMessage = document.getElementById("hold-message");
    const columns = ["A", "B", "C", "D", "E", "F"];
    const exitRows = new Set([9]);
    const totalRows = 12;
    const requiredSeats = Math.max(1, bookingDraft?.passengers?.length ?? bookingDraft?.passengerCount ?? 1);
    const selectedSeats = new Set(Array.isArray(bookingDraft?.seatNumbers) ? bookingDraft.seatNumbers : []);
    const availableSeats = new Set();

    const sessionId = sessionStorage.getItem("sessionId");
    const firstName = sessionStorage.getItem("firstName");

    const loggedInUserId = getLoggedInUserId();
    const isSignedIn = !!sessionId && typeof loggedInUserId == "number"

    const welcomeMessage = document.getElementById("welcome-message");
    const loginLink = document.getElementById("login-link");
    const logoutButton = document.getElementById("logout-button");

    if (sessionId && firstName) {
        if (welcomeMessage) {
            welcomeMessage.textContent = `Welcome, ${firstName}`;
        }

        if (loginLink) {
            loginLink.style.display = "none";
        }

        if (logoutButton) {
            logoutButton.style.display = "inline-block";
        }
    }

    if (logoutButton) {
        logoutButton.addEventListener("click", async () => {
            const currentSessionId = sessionStorage.getItem("sessionId");

            try {
                if (currentSessionId) {
                    await fetch(`/api/auth/logout?sessionId=${encodeURIComponent(currentSessionId)}`, {
                        method: "POST"
                    });
                }
            } catch (_) {}

            sessionStorage.clear();
            window.location.href = "/log_in";
        });
    }

    document.querySelector(".seat-page h2").textContent = requiredSeats === 1
        ? "Select Your Seat"
        : `Select ${requiredSeats} Seats`;

    if (bookingDraft?.from && bookingDraft?.to) {
        helpLabel.textContent = `Choose ${requiredSeats} seat${requiredSeats === 1 ? "" : "s"} for ${bookingDraft.from} → ${bookingDraft.to}.`;
    }

    function getLoggedInUserId() {
        if (typeof bookingDraft?.userId === "number") {
            return bookingDraft.userId;
        }

        try {
            const user = JSON.parse(sessionStorage.getItem("user") ?? "null");
            return typeof user?.userId === "number" ? user.userId : null;
        } catch {
            return null;
        }
    }

    function normalizeSeatNumbers(seatNumbers) {
        return [...new Set(seatNumbers)].sort();
    }

    function seatListsMatch(left, right) {
        const normalizedLeft = normalizeSeatNumbers(left);
        const normalizedRight = normalizeSeatNumbers(right);

        if (normalizedLeft.length !== normalizedRight.length) {
            return false;
        }

        for (let i = 0; i < normalizedLeft.length; i++) {
            if (normalizedLeft[i] !== normalizedRight[i]) {
                return false;
            }
        }

        return true;
    }

    function persistBookingDraft() {
        if (!bookingDraft) {
            return;
        }

        bookingDraft.seatNumbers = normalizeSeatNumbers(Array.from(selectedSeats));
        sessionStorage.setItem("bookingDraft", JSON.stringify(bookingDraft));

        if (bookingDraft.seatNumbers.length > 0) {
            sessionStorage.setItem("selectedSeat", bookingDraft.seatNumbers.join(", "));
        } else {
            sessionStorage.removeItem("selectedSeat");
        }
    }

    function clearStoredHoldIfSelectionChanged() {
        if (!bookingDraft) {
            return;
        }

        const currentSelection = Array.from(selectedSeats);
        const storedSelection = Array.isArray(bookingDraft.seatNumbers) ? bookingDraft.seatNumbers : [];

        if (seatListsMatch(currentSelection, storedSelection)) {
            return;
        }

        bookingDraft.holdId = null;
        bookingDraft.holdExpiryTime = null;
        bookingDraft.totalPrice = null;
        sessionStorage.removeItem("holdData");
        persistBookingDraft();
    }

    function renderSeatMap() {
        seatMap.innerHTML = "";

        for (let rowNumber = 1; rowNumber <= totalRows; rowNumber++) {
            const rowDiv = document.createElement("div");
            rowDiv.className = "seat-row";

            for (let seatIndex = 0; seatIndex < columns.length; seatIndex++) {
                if (seatIndex === 3) {
                    const rowLabel = document.createElement("div");
                    rowLabel.className = "row-num";
                    rowLabel.textContent = rowNumber;
                    rowDiv.append(rowLabel);
                }

                const seatId = `${rowNumber}${columns[seatIndex]}`;
                const seatButton = document.createElement("button");
                seatButton.dataset.seatId = seatId;

                if (exitRows.has(rowNumber)) {
                    seatButton.className = "seat exit-seat";
                    rowDiv.append(seatButton);
                    continue;
                }

                const isSelected = selectedSeats.has(seatId);
                const isAvailable = availableSeats.has(seatId);

                if (isSelected) {
                    seatButton.className = "seat selected";
                } else if (isAvailable) {
                    seatButton.className = "seat available";
                } else {
                    seatButton.className = "seat taken";
                }

                if (isSelected || isAvailable) {
                    seatButton.addEventListener("click", () => {
                        holdMessage.textContent = "";

                        if (selectedSeats.has(seatId)) {
                            selectedSeats.delete(seatId);
                        } else {
                            if (selectedSeats.size >= requiredSeats) {
                                updateUI();
                                return;
                            }

                            selectedSeats.add(seatId);
                        }

                        clearStoredHoldIfSelectionChanged();
                        renderSeatMap();
                        updateUI();
                    });
                }

                rowDiv.append(seatButton);
            }

            seatMap.append(rowDiv);
        }
    }

    function updateUI() {
        if (!bookingDraft || !bookingDraft.flightId) {
            selectedLabel.textContent = "Booking details are missing. Please restart your booking.";
            continueButton.classList.remove("active");
            continueButton.disabled = true;
            return;
        }

        const chosenSeats = normalizeSeatNumbers(Array.from(selectedSeats));

        if (chosenSeats.length > 0) {
            selectedLabel.textContent = `Selected: ${chosenSeats.join(", ")}`;
        } else {
            selectedLabel.textContent = `Select ${requiredSeats} seat${requiredSeats === 1 ? "" : "s"} to continue`;
        }

        const selectionComplete = chosenSeats.length === requiredSeats;
        continueButton.classList.toggle("active", selectionComplete);
        continueButton.disabled = !selectionComplete;
    }

    async function loadSeats() {
        if (!bookingDraft || !bookingDraft.flightId) {
            holdMessage.textContent = "Choose a flight first, then return to seat selection.";
            updateUI();
            return;
        }

        holdMessage.textContent = "";

        try {
            const response = await fetch(`/api/seats?flightId=${encodeURIComponent(bookingDraft.flightId)}`);

            if (!response.ok) {
                throw new Error("Unable to load seats");
            }

            const seats = await response.json();
            availableSeats.clear();

            for (let i = 0; i < seats.length; i++) {
                availableSeats.add(seats[i].seatNumber);
            }

            renderSeatMap();
            updateUI();
        } catch {
            holdMessage.textContent = "Unable to load seats right now. Please try again.";
            updateUI();
        }
    }

    continueButton.addEventListener("click", async () => {
        if (!bookingDraft || selectedSeats.size !== requiredSeats) {
            return;
        }


        const seatNumbers = normalizeSeatNumbers(Array.from(selectedSeats));

        if (
            bookingDraft.holdId &&
            bookingDraft.holdExpiryTime &&
            seatListsMatch(seatNumbers, bookingDraft.seatNumbers ?? [])
        ) {
            bookingDraft.userId = userId;
            persistBookingDraft();
            window.location.href = "/loyaltypage";
            return;
        }

        holdMessage.textContent = "";
        continueButton.disabled = true;

        try {
            const response = await fetch("/api/holds", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    userId: isSignedIn ? loggedInUserId : null,
                    flightId: bookingDraft.flightId,
                    seatNumbers
                })
            });

            const text = await response.text();
            let result = null;

            try {
                result = text ? JSON.parse(text) : null;
            } catch {
                result = null;
            }

            if (!response.ok) {
                holdMessage.textContent = result?.error ?? text ?? "Unable to hold the selected seats.";
                return;
            }

            bookingDraft.userId = isSignedIn ? loggedInUserId: null;
            bookingDraft.seatNumbers = seatNumbers;
            bookingDraft.holdId = result?.holdId ?? null;
            bookingDraft.holdExpiryTime = result?.expiryTime ?? null;
            bookingDraft.totalPrice = result?.totalPrice ?? null;
            persistBookingDraft();

            if (result) {
                sessionStorage.setItem("holdData", JSON.stringify(result));
            }

            window.location.href = "/loyaltypage";
        } catch {
            holdMessage.textContent = "Unable to hold the selected seats right now. Please try again.";
        } finally {
            updateUI();
        }
    });

    loadSeats();
</script>

</body>
</html>
