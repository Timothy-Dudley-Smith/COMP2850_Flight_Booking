<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Results</title>
    <link rel="stylesheet" href="../home/styles/style.css">
</head>
<body>

<header class="header">
    <nav class="top-nav">
        <div class="left-nav">
            <div class="logo">
                <img src="/styles/Images/Logo.png" class="Airline_Logo">
                <img src="/styles/Images/Star_Alliance.jpg" class="Star_Alliance">
            </div>
        </div>

        <div class="center-nav">
            <a href="/">Home</a>
            <a href="/recommendations">Recommendations</a>
            <a href="/book">Book</a>
            <a href="/manage">Manage</a>
        </div>

        <div class="right-nav">
            <span class="lang">United Kingdom - EN</span>
            <a href="/log_in">Log In</a>
        </div>
    </nav>
</header>

<section class="flights-overview-header">

    <div class="flights-overview">
        <h1 id="route-title"></h1>
        <p id="route-date"></p>
    </div>


</section>

<div id="passenger-forms"></div>
<p id="booking-message" style="max-width: 960px; margin: 16px auto 0; padding: 0 20px; color: #c0392b; font-weight: 600;"></p>
<div style="max-width: 960px; margin: 0 auto; padding: 0 20px 40px;">
    <button class="continue-btn" id="continue-btn" type="button">Continue</button>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const from = params.get("from");
    const to = params.get("to");
    const date = params.get("date") ?? "";
    const passengers = Math.max(1, parseInt(params.get("passengers") ?? "1", 10));
    const cabin = params.get("cabin") ?? "Economy";
    const flightId = params.get("flightId") ?? "";
    const existingDraftRaw = sessionStorage.getItem("bookingDraft");
    const existingDraft = existingDraftRaw ? JSON.parse(existingDraftRaw) : null;
    const savedPassengers = Array.isArray(existingDraft?.passengers) ? existingDraft.passengers : [];

    document.getElementById("route-title").textContent = `${from ?? ""} → ${to ?? ""}`;
    //used text header of page telling user which flights are to be shown

    if (date) {
        const d = new Date(date);
        document.getElementById("route-date").textContent = d.toLocaleDateString("en-GB", {
            day: "numeric",
            month: "long"
        });
    } else {
        document.getElementById("route-date").textContent = "From today onwards";
    }

    const container = document.getElementById("passenger-forms");
    const message = document.getElementById("booking-message");

    function getLoggedInUserId() {
        try {
            const user = JSON.parse(sessionStorage.getItem("user") ?? "null");
            return typeof user?.userId === "number" ? user.userId : null;
        } catch {
            return null;
        }
    }

    function padDatePart(value) {
        return String(value).padStart(2, "0");
    }

    function escapeHtml(value) {
        return String(value ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    for (let i = 1; i <= passengers; i++) {
        const savedPassenger = savedPassengers[i - 1] ?? {};
        const savedDateParts = typeof savedPassenger.dateOfBirth === "string"
            ? savedPassenger.dateOfBirth.split("-")
            : [];

        container.insertAdjacentHTML("beforeend", `
            <div class="booking_page_1">
                <h2>Passenger ${i}</h2>
                <p class="age-label">Age 16+</p>

                <div class="user_input_box">
                    <label>Title</label>
                    <select id="passenger-${i}-title">
                        <option value="" disabled ${!savedPassenger.title ? "selected" : ""}>Select title</option>
                        <!-- option for user to click there title with placholder text -->
                        <option ${savedPassenger.title === "Mr" ? "selected" : ""}>Mr</option>
                        <option ${savedPassenger.title === "Mrs" ? "selected" : ""}>Mrs</option>
                        <option ${savedPassenger.title === "Miss" ? "selected" : ""}>Miss</option>
                        <option ${savedPassenger.title === "Ms" ? "selected" : ""}>Ms</option>
                        <option ${savedPassenger.title === "Dr" ? "selected" : ""}>Dr</option>
                    </select>
                </div>


                <div class="user_input_box">
                    <label>First names</label>
                    <small>As shown on document</small>
                    <input type="text" id="passenger-${i}-first-name" value="${escapeHtml(savedPassenger.firstName)}">
                </div>
                <!-- user input toi enter there first name-->


                <div class="user_input_box">
                    <label>Last name</label>
                    <small>As shown on document</small>
                    <input type="text" id="passenger-${i}-last-name" value="${escapeHtml(savedPassenger.lastName)}">
                </div>
                <!-- user input toi enter there last name-->


                <div class="user_input_box">
                    <label>Passport Number</label>
                    <small>As shown on document</small>
                    <input type="text" id="passenger-${i}-passport-number" value="${escapeHtml(savedPassenger.passportNumber)}">
                </div>
                <!-- user input toi enter there last name-->


                <div class="user_input_box">
                    <label>Gender</label>
                    <small>As shown on document</small>
                    <select id="passenger-${i}-gender">
                        <option value="" disabled ${!savedPassenger.gender ? "selected" : ""}>Select gender</option>
                        <option ${savedPassenger.gender === "Male" ? "selected" : ""}>Male</option>
                        <option ${savedPassenger.gender === "Female" ? "selected" : ""}>Female</option>
                        <option ${savedPassenger.gender === "Other" ? "selected" : ""}>Other</option>
                    </select>
                </div>
                <!-- option for user to click there gender with placholder text -->


                <div class="user_input_box">
                    <!-- used claud sonnet 4.6 to sort fotmatting only -->
                    <!-- allows user to enter dob -->
                    <label>Date of birth</label>
                    <div class="dob-row">

                        <div class="dob-field">
                            <small>DD</small>
                            <input type="number" id="passenger-${i}-dob-day" min="1" max="31" value="${savedDateParts[2] ?? ""}">
                        </div>

                        <div class="dob-field">
                            <small>MM</small>
                            <input type="number" id="passenger-${i}-dob-month" min="1" max="12" value="${savedDateParts[1] ?? ""}">
                        </div>

                        <div class="dob-field">
                            <small>YYYY</small>
                            <input type="number" id="passenger-${i}-dob-year" min="1900" max="2099" value="${savedDateParts[0] ?? ""}">
                        </div>


                    </div>
                </div>
            </div>
        `);
    }

    document.getElementById("continue-btn").addEventListener("click", () => {
        const passengerDetails = [];

        for (let i = 1; i <= passengers; i++) {
            const title = document.getElementById(`passenger-${i}-title`).value.trim();
            const firstName = document.getElementById(`passenger-${i}-first-name`).value.trim();
            const lastName = document.getElementById(`passenger-${i}-last-name`).value.trim();
            const passportNumber = document.getElementById(`passenger-${i}-passport-number`).value.trim();
            const gender = document.getElementById(`passenger-${i}-gender`).value.trim();
            const day = document.getElementById(`passenger-${i}-dob-day`).value.trim();
            const month = document.getElementById(`passenger-${i}-dob-month`).value.trim();
            const year = document.getElementById(`passenger-${i}-dob-year`).value.trim();

            if (!firstName || !lastName || !passportNumber || !gender || !day || !month || !year) {
                message.textContent = `Complete all details for passenger ${i} before continuing.`;
                return;
            }

            const dateOfBirth = `${year}-${padDatePart(month)}-${padDatePart(day)}`;

            passengerDetails.push({
                title,
                firstName,
                lastName,
                passportNumber,
                gender,
                dateOfBirth
            });
        }

        message.textContent = "";

        const bookingDraft = {
            userId: getLoggedInUserId(),
            flightId,
            from,
            to,
            date,
            passengerCount: passengers,
            cabin,
            passengers: passengerDetails,
            seatNumbers: Array.isArray(existingDraft?.seatNumbers) ? existingDraft.seatNumbers : [],
            addOns: existingDraft?.addOns ?? {}
        };

        sessionStorage.setItem("bookingDraft", JSON.stringify(bookingDraft));
        sessionStorage.removeItem("pendingBookingRequest");
        window.location.href = "/seatmap";
    });
</script>





 </body>
 </html>
