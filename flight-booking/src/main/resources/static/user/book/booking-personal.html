<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Results</title>
    <link rel="stylesheet" href="../home/styles/style.css">
</head>
<body>

<header class="header">
    <nav class="top-nav">
        <div class="left-nav">
            <div class="logo">
                <img src="/images/Logo.png" class="Airline_Logo">
                <img src="/images/Star_Alliance.jpg" class="Star_Alliance">
            </div>
        </div>

        <div class="center-nav">
            <a href="/">Home</a>
            <a href="/recommendations">Recommendations</a>
            <a href="/book">Book</a>
            <a href="/manage">Manage</a>
        </div>

        <div class="right-nav">
            <span class="lang">United Kingdom - EN</span>
            <span id="welcome-message"></span>
            <a href="/log_in" id="login-link">Log In</a>
            <button id="logout-button" type="button" style="display: none;">Log Out</button>
        </div>
    </nav>
</header>

<section class="flights-overview-header">

    <div class="flights-overview">
        <h1 id="route-title"></h1>
        <p id="route-date"></p>
    </div>


</section>

<div id="passenger-forms"></div>
<p id="booking-message" style="max-width: 960px; margin: 16px auto 0; padding: 0 20px; color: #c0392b; font-weight: 600;"></p>

<script>
    const params = new URLSearchParams(window.location.search);
    const from = params.get("from");
    const to = params.get("to");
    const date = params.get("date") ?? "";
    const passengers = Math.max(1, parseInt(params.get("passengers") ?? "1", 10));
    const cabin = params.get("cabin") ?? "Economy";
    const price = params.get("price") ?? "0";
    const flightId = params.get("flightId") ?? "";

    const sessionId = sessionStorage.getItem("sessionId");
    const firstName = sessionStorage.getItem("firstName");

    const welcomeMessage = document.getElementById("welcome-message");
    const loginLink = document.getElementById("login-link");
    const logoutButton = document.getElementById("logout-button");

    if (sessionId && firstName) {
        if (welcomeMessage) {
            welcomeMessage.textContent = `Welcome, ${firstName}`;
        }

        if (loginLink) {
            loginLink.style.display = "none";
        }

        if (logoutButton) {
            logoutButton.style.display = "inline-block";
        }
    }

    if (logoutButton) {
        logoutButton.addEventListener("click", async () => {
            const currentSessionId = sessionStorage.getItem("sessionId");

            try {
                if (currentSessionId) {
                    await fetch(`/api/auth/logout?sessionId=${encodeURIComponent(currentSessionId)}`, {
                        method: "POST"
                    });
                }
            } catch (_) {}

            sessionStorage.clear();
            window.location.href = "/log_in";
        });
    }

    document.getElementById("route-title").textContent = from + " → " + to;
    //used text header of page telling user which flights are to be shown



    if (date) {
        const d = new Date(date);
        document.getElementById("route-date").textContent = d.toLocaleDateString("en-GB", {
            day: "numeric",
            month: "long"
        });
    } else {
        document.getElementById("route-date").textContent = "From today onwards";
    }

    const container = document.getElementById("passenger-forms");
    const message = document.getElementById("booking-message");

    function getLoggedInUserId() {
        try {
            const user = JSON.parse(sessionStorage.getItem("user") ?? "null");
            return typeof user?.userId === "number" ? user.userId : null;
        } catch {
            return null;
        }
    }

    for (let i = 1; i <= passengers; i++) {
        container.insertAdjacentHTML("beforeend", `
            <div class="booking_page_1">
                <h2>Passenger ${i}</h2>
                <p class="age-label">Age 16+</p>

                <div class="user_input_box">
                    <label>Title</label>
                    <select>
                        <option value="" disabled selected>Select title</option>
                        <!-- option for user to click there title with placholder text -->
                        <option>Mr</option>
                        <option>Mrs</option>
                        <option>Miss</option>
                        <option>Ms</option>
                        <option>Dr</option>
                    </select>
                </div>


                <div class="user_input_box">
                    <label>First names</label>
                    <small>As shown on document</small>
                    <input type="text">
                </div>
                <!-- user input toi enter there first name-->


                <div class="user_input_box">
                    <label>Last name</label>
                    <small>As shown on document</small>
                    <input type="text">
                </div>
                <!-- user input toi enter there last name-->


                <div class="user_input_box">
                    <label>Passport Number</label>
                    <small>As shown on document</small>
                    <input type="text">
                </div>
                <!-- user input toi enter there last name-->


                <div class="user_input_box">
                    <label>Gender</label>
                    <small>As shown on document</small>
                    <select>
                        <option value="" disabled selected>Select gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
                <!-- option for user to click there gender with placholder text -->


                <div class="user_input_box">
                    <!-- used claud sonnet 4.6 to sort fotmatting only -->
                    <!-- allows user to enter dob -->
                    <label>Date of birth</label>
                    <div class="dob-row">

                        <div class="dob-field">
                            <small>DD</small>
                            <input type="number" min="1" max="31">
                        </div>

                        <div class="dob-field">
                            <small>MM</small>
                            <input type="number" min="1" max="12">
                        </div>

                        <div class="dob-field">
                            <small>YYYY</small>
                            <input type="number" min="1900" max="2099">
                        </div>


                    </div>
                </div>
            </div>
        `);
    }

    container.insertAdjacentHTML("beforeend", `
        <button class="continue-btn" onclick="collectAndContinue()">Continue</button>
    `);

    function collectAndContinue() {
        const forms = document.querySelectorAll('.booking_page_1');
        const passengerData = [];

        for (let i = 0; i < forms.length; i++) {
            const form = forms[i];
            const selects = form.querySelectorAll('select');
            const inputs = form.querySelectorAll('input');

            const day = String(inputs[3].value).padStart(2, '0');
            const month = String(inputs[4].value).padStart(2, '0');
            const year = inputs[5].value;

            if (
                !selects[0].value ||
                !inputs[0].value.trim() ||
                !inputs[1].value.trim() ||
                !inputs[2].value.trim() ||
                !selects[1].value ||
                !inputs[3].value ||
                !inputs[4].value ||
                !inputs[5].value
            ) {
                message.textContent = `Complete all details for passenger ${i + 1} before continuing.`;
                return;
            }

            passengerData.push({
                title: selects[0].value,
                firstName: inputs[0].value.trim(),
                lastName: inputs[1].value.trim(),
                passportNumber: inputs[2].value.trim(),
                gender: selects[1].value,
                dateOfBirth: `${year}-${month}-${day}`
            });
        }

        message.textContent = "";

        sessionStorage.setItem('passengerData', JSON.stringify(passengerData));

        const bookingDraft = {
            userId: getLoggedInUserId(),
            flightId,
            from,
            to,
            date,
            passengerCount: passengers,
            cabin,
            price,
            passengers: passengerData,
            seatNumbers: [],
            addOns: {}
        };

        sessionStorage.setItem("bookingDraft", JSON.stringify(bookingDraft));
        window.location.href = "/seatmap?flightId=" + encodeURIComponent(flightId);
    }
</script>

</body>
</html>
