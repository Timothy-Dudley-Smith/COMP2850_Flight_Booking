<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="../home/styles/style.css">
</head>
<body>

<header class="header">
    <nav class="top-nav">
        <div class="left-nav">
            <div class="logo">
                <img src="/images/Logo.png" class="Airline_Logo">
                <img src="/images/Star_Alliance.jpg" class="Star_Alliance">
            </div>
        </div>

        <div class="center-nav">
            <a href="/">Home</a>
            <a href="/recommendations">Recommendations</a>
            <a href="/book">Book</a>
            <a href="/manage">Manage</a>
        </div>

        <div class="right-nav">
            <span class="lang">United Kingdom - EN</span>
            <a href="/log_in">Log In</a>
        </div>
    </nav>
</header>

<section class="flights-overview-header">
    <div class="flights-overview">
        <h1 id="route-title">Payment</h1>
        <p id="route-date">Complete your booking</p>
    </div>
</section>

<section style="max-width: 1100px; margin: 30px auto; padding: 0 20px;">
    <div style="display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 30px; align-items: start;">

        <!-- PAYMENT FORM -->
        <div class="booking_page_1">
            <h2>Payment details</h2>
            <p class="age-label">Enter your card information</p>

            <div class="user_input_box">
                <label>Cardholder name</label>
                <input type="text" id="cardholder-name">
            </div>

            <div class="user_input_box">
                <label>Card number</label>
                <input type="text" id="card-number" maxlength="16" placeholder="1234123412341234">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
                <div class="user_input_box">
                    <label>Expiry month</label>
                    <input type="number" id="expiry-month" min="1" max="12" placeholder="MM">
                </div>

                <div class="user_input_box">
                    <label>Expiry year</label>
                    <input type="number" id="expiry-year" min="2026" max="2100" placeholder="YYYY">
                </div>

                <div class="user_input_box">
                    <label>CVV</label>
                    <input type="text" id="cvv" maxlength="4" placeholder="123">
                </div>
            </div>

            <div class="user_input_box">
                <label>Billing address</label>
                <input type="text" id="billing-address">
            </div>

            <p id="payment-message" style="margin-top: 10px; font-weight: 600;"></p>

            <button class="continue-btn" id="pay-btn">Pay now</button>
        </div>

        <!-- BOOKING SUMMARY -->
        <div class="booking_page_1">
            <h2>Booking summary</h2>

            <div class="user_input_box">
                <label>Route</label>
                <p id="summary-route">Not available</p>
            </div>

            <div class="user_input_box">
                <label>Date</label>
                <p id="summary-date">Not available</p>
            </div>

            <div class="user_input_box">
                <label>Passengers</label>
                <p id="summary-passengers">Not available</p>
            </div>

            <div class="user_input_box">
                <label>Seat</label>
                <p id="summary-seat">Not selected yet</p>
            </div>

            <div class="user_input_box">
                <label>Add-ons</label>
                <p id="summary-loyalty">Not selected yet</p>
            </div>

            <div class="user_input_box">
                <label>Total</label>
                <p id="summary-total">To be confirmed</p>
            </div>
        </div>

    </div>
</section>

<script>
    const pendingBookingRequestRaw = sessionStorage.getItem("pendingBookingRequest");
    const bookingDraftRaw = sessionStorage.getItem("bookingDraft");
    let bookingData = null;
    const message = document.getElementById("payment-message");
    const payButton = document.getElementById("pay-btn");

    try {
        bookingData = pendingBookingRequestRaw
            ? JSON.parse(pendingBookingRequestRaw)
            : (bookingDraftRaw ? JSON.parse(bookingDraftRaw) : null);
    } catch {
        bookingData = null;
    }

    function formatDisplayDate(date) {
        if (!date) {
            return "From today onwards";
        }

        const parsedDate = new Date(date);
        if (Number.isNaN(parsedDate.getTime())) {
            return "From today onwards";
        }

        return parsedDate.toLocaleDateString("en-GB");
    }

    function formatCurrency(amount) {
        if (typeof amount !== "number" || !Number.isFinite(amount)) {
            return "To be confirmed";
        }

        return `£${amount.toFixed(2)}`;
    }

    function getPassengerSummary(data) {
        const passengerList = Array.isArray(data?.passengers) ? data.passengers : [];

        if (passengerList.length > 0) {
            return `${passengerList.length} passenger${passengerList.length === 1 ? "" : "s"}`;
        }

        const count = Number(data?.passengerCount);
        if (Number.isFinite(count) && count > 0) {
            return `${count} passenger${count === 1 ? "" : "s"}`;
        }

        return "Not available";
    }

    function getSeatSummary(data) {
        const seatNumbers = Array.isArray(data?.seatNumbers) ? data.seatNumbers : [];
        return seatNumbers.length > 0 ? seatNumbers.join(", ") : "Not selected yet";
    }

    function getAddOnSummary(data) {
        const addOns = data?.addOns;

        if (!addOns) {
            return "No add-ons selected";
        }

        const selections = [];

        if (addOns.baggage) {
            selections.push(addOns.baggage);
        }

        if (addOns.meal) {
            selections.push(addOns.meal);
        }

        if (addOns.insurance) {
            selections.push(addOns.insurance);
        }

        if (Array.isArray(addOns.extras)) {
            for (let i = 0; i < addOns.extras.length; i++) {
                selections.push(addOns.extras[i]);
            }
        }

        return selections.length > 0 ? selections.join(", ") : "No add-ons selected";
    }

    document.getElementById("summary-route").textContent = bookingData?.from && bookingData?.to
        ? `${bookingData.from} → ${bookingData.to}`
        : "Not available";
    document.getElementById("summary-date").textContent = formatDisplayDate(bookingData?.date);
    document.getElementById("summary-passengers").textContent = getPassengerSummary(bookingData);
    document.getElementById("summary-seat").textContent = getSeatSummary(bookingData);
    document.getElementById("summary-loyalty").textContent = getAddOnSummary(bookingData);
    document.getElementById("summary-total").textContent = formatCurrency(Number(bookingData?.totalPrice));

    if (!bookingData?.holdId) {
        message.textContent = "Your booking hold is missing. Return to seat selection and try again.";
        payButton.disabled = true;
    }

    payButton.addEventListener("click", async function () {
        const name = document.getElementById("cardholder-name").value.trim();
        const number = document.getElementById("card-number").value.trim();
        const month = parseInt(document.getElementById("expiry-month").value);
        const year = parseInt(document.getElementById("expiry-year").value);
        const cvv = document.getElementById("cvv").value.trim();
        const address = document.getElementById("billing-address").value.trim();

        message.textContent = "";

        if (!bookingData?.holdId) { message.textContent = "Your booking hold is missing. Return to seat selection and try again."; return; }
        if (name === "") { message.textContent = "Enter cardholder name."; return; }
        if (!/^\d{16}$/.test(number)) { message.textContent = "Card number must be 16 digits."; return; }
        if (!/^\d{3,4}$/.test(cvv)) { message.textContent = "Invalid CVV."; return; }
        if (month < 1 || month > 12) { message.textContent = "Invalid expiry month."; return; }
        if (year < 2026) { message.textContent = "Card expired."; return; }
        if (address === "") { message.textContent = "Enter billing address."; return; }

        try {
            payButton.disabled = true;

            const res = await fetch("/checkout", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    holdId: bookingData.holdId,
                    cardholderName: name,
                    cardNumber: number,
                    expiryMonth: month,
                    expiryYear: year,
                    cvv: cvv,
                    billingAddress: address,
                    pointsToRedeem: 0
                })
            });

            const text = await res.text();
            let result = null;

            try {
                result = text ? JSON.parse(text) : null;
            } catch {
                result = null;
            }

            if (!res.ok || !result?.success) {
                message.textContent = result?.message ?? text ?? "Payment failed. Try again.";
                return;
            } else {
                message.textContent = result.message ?? "Payment successful.";
                sessionStorage.setItem("latestCheckoutResponse", JSON.stringify(result));
            }
        } catch {
            message.textContent = "Payment failed. Try again.";
        } finally {
            payButton.disabled = false;
        }
    });
</script>

</body>
</html>
