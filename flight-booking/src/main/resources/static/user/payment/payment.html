<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="../home/styles/style.css">
</head>
<body>

<header class="header">
    <nav class="top-nav">
        <div class="left-nav">
            <div class="logo">
                <img src="/styles/Images/Logo.png" class="Airline_Logo">
                <img src="/styles/Images/Star_Alliance.jpg" class="Star_Alliance">
            </div>
        </div>

        <div class="center-nav">
            <a href="/">Home</a>
            <a href="/recommendations">Recommendations</a>
            <a href="/book">Book</a>
            <a href="/manage">Manage</a>
        </div>

        <div class="right-nav">
            <span class="lang">United Kingdom - EN</span>
            <a href="/log_in">Log In</a>
        </div>
    </nav>
</header>

<section class="flights-overview-header">
    <div class="flights-overview">
        <h1 id="route-title">Payment</h1>
        <p id="route-date">Complete your booking</p>
    </div>
</section>

<section style="max-width: 1100px; margin: 30px auto; padding: 0 20px;">
    <div style="display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 30px; align-items: start;">

        <!-- PAYMENT FORM -->
        <div class="booking_page_1">
            <h2>Payment details</h2>
            <p class="age-label">Enter your card information</p>

            <div class="user_input_box">
                <label>Cardholder name</label>
                <input type="text" id="cardholder-name">
            </div>

            <div class="user_input_box">
                <label>Card number</label>
                <input type="text" id="card-number" maxlength="16" placeholder="1234123412341234">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
                <div class="user_input_box">
                    <label>Expiry month</label>
                    <input type="number" id="expiry-month" min="1" max="12" placeholder="MM">
                </div>

                <div class="user_input_box">
                    <label>Expiry year</label>
                    <input type="number" id="expiry-year" min="2026" max="2100" placeholder="YYYY">
                </div>

                <div class="user_input_box">
                    <label>CVV</label>
                    <input type="text" id="cvv" maxlength="4" placeholder="123">
                </div>
            </div>

            <div class="user_input_box">
                <label>Billing address</label>
                <input type="text" id="billing-address">
            </div>

            <p id="payment-message" style="margin-top: 10px; font-weight: 600;"></p>

            <button class="continue-btn" id="pay-btn">Pay now</button>
        </div>

        <!-- BOOKING SUMMARY -->
        <div class="booking_page_1">
            <h2>Booking summary</h2>

            <div class="user_input_box">
                <label>Route</label>
                <p id="summary-route">Not available</p>
            </div>

            <div class="user_input_box">
                <label>Date</label>
                <p id="summary-date">Not available</p>
            </div>

            <div class="user_input_box">
                <label>Passengers</label>
                <p id="summary-passengers">Not available</p>
            </div>

            <div class="user_input_box">
                <label>Seat</label>
                <p id="summary-seat">Not selected yet</p>
            </div>

            <div class="user_input_box">
                <label>Loyalty</label>
                <p id="summary-loyalty">Not selected yet</p>
            </div>

            <div class="user_input_box">
                <label>Total</label>
                <p id="summary-total">To be confirmed</p>
            </div>
        </div>

    </div>
</section>

<script>
    const bookingDraftRaw = sessionStorage.getItem("bookingDraft");
    const bookingDraft = bookingDraftRaw ? JSON.parse(bookingDraftRaw) : null;

    function formatRouteDate(date) {
        if (!date) {
            return "From today onwards";
        }

        const parsedDate = new Date(date);
        if (Number.isNaN(parsedDate.getTime())) {
            return "From today onwards";
        }

        return parsedDate.toLocaleDateString("en-GB");
    }

    function getPassengerSummary() {
        if (!Array.isArray(bookingDraft?.passengers) || bookingDraft.passengers.length === 0) {
            return "Not available";
        }

        return bookingDraft.passengers
            .map((passenger) => `${passenger.firstName} ${passenger.lastName}`)
            .join(", ");
    }

    function getAddOnSummary() {
        if (!bookingDraft?.addOns) {
            return "No extras selected";
        }

        const items = [];

        if (bookingDraft.addOns.baggage) {
            items.push(bookingDraft.addOns.baggage);
        }

        if (bookingDraft.addOns.meal) {
            items.push(bookingDraft.addOns.meal);
        }

        if (bookingDraft.addOns.insurance) {
            items.push(bookingDraft.addOns.insurance);
        }

        if (Array.isArray(bookingDraft.addOns.extras)) {
            for (let i = 0; i < bookingDraft.addOns.extras.length; i++) {
                items.push(bookingDraft.addOns.extras[i]);
            }
        }

        return items.length > 0 ? items.join(", ") : "No extras selected";
    }

    document.getElementById("summary-route").textContent =
        bookingDraft ? `${bookingDraft.from} → ${bookingDraft.to}` : "Not available";

    document.getElementById("summary-date").textContent =
        bookingDraft ? formatRouteDate(bookingDraft.date) : "Not available";

    document.getElementById("summary-passengers").textContent = getPassengerSummary();

    document.getElementById("summary-seat").textContent =
        Array.isArray(bookingDraft?.seatNumbers) && bookingDraft.seatNumbers.length > 0
            ? bookingDraft.seatNumbers.join(", ")
            : "Not selected yet";

    document.getElementById("summary-loyalty").textContent = getAddOnSummary();

    document.getElementById("summary-total").textContent = "Calculated on the backend";

    document.getElementById("pay-btn").addEventListener("click", async function () {

        const name = document.getElementById("cardholder-name").value.trim();
        const number = document.getElementById("card-number").value.trim();
        const month = parseInt(document.getElementById("expiry-month").value);
        const year = parseInt(document.getElementById("expiry-year").value);
        const cvv = document.getElementById("cvv").value.trim();
        const address = document.getElementById("billing-address").value.trim();
        const message = document.getElementById("payment-message");

        message.textContent = "";

        if (name === "") {
            message.textContent = "Enter cardholder name.";
            return;
        }

        if (!/^\d{16}$/.test(number)) {
            message.textContent = "Card number must be 16 digits.";
            return;
        }

        if (!/^\d{3,4}$/.test(cvv)) {
            message.textContent = "Invalid CVV.";
            return;
        }

        if (month < 1 || month > 12) {
            message.textContent = "Invalid expiry month.";
            return;
        }

        if (year < 2026) {
            message.textContent = "Card expired.";
            return;
        }

        if (address === "") {
            message.textContent = "Enter billing address.";
            return;
        }

        if (!bookingDraft || !bookingDraft.flightId || !Array.isArray(bookingDraft.passengers) || bookingDraft.passengers.length === 0) {
            message.textContent = "Booking details are incomplete. Please restart the booking flow.";
            return;
        }

        if (!Array.isArray(bookingDraft.seatNumbers) || bookingDraft.seatNumbers.length !== bookingDraft.passengers.length) {
            message.textContent = "Choose one seat per passenger before checking out.";
            return;
        }

        let userId = bookingDraft.userId ?? null;
        if (userId === null) {
            try {
                const user = JSON.parse(sessionStorage.getItem("user") ?? "null");
                userId = typeof user?.userId === "number" ? user.userId : null;
            } catch {
                userId = null;
            }
        }

        const pendingBookingRequest = {
            userId,
            flightId: bookingDraft.flightId,
            passengers: bookingDraft.passengers.map((passenger) => ({
                firstName: passenger.firstName,
                lastName: passenger.lastName,
                passportNumber: passenger.passportNumber,
                gender: passenger.gender,
                dateOfBirth: passenger.dateOfBirth
            })),
            seatNumbers: bookingDraft.seatNumbers,
            cabin: bookingDraft.cabin ?? "Economy",
            addOns: bookingDraft.addOns ?? {}
        };

        sessionStorage.setItem("pendingBookingRequest", JSON.stringify(pendingBookingRequest));
        message.textContent = "Payment details validated. The frontend booking payload is ready; the backend still needs to calculate the price and create the booking.";
    });
</script>

</body>
</html>
