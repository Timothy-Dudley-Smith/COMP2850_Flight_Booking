<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="/log_in/styles/style.css">
    <script src="/log_in/scripts/login.js" defer></script>
</head>
<body>

<header class="header">
    <nav class="top-nav">
        <div class="left-nav">
            <div class="logo">
                <img src="/images/Logo.png" class="Airline_Logo">
                <img src="/images/Star_Alliance.jpg" class="Star_Alliance">
            </div>
        </div>

        <div class="center-nav">
            <a href="/">Home</a>
            <a href="/recommendations">Recommendations</a>
            <a href="/book">Book</a>
            <a href="/manage">Manage</a>
        </div>

        <div class="right-nav">
            <span class="lang">United Kingdom - EN</span>
            <a href="/log_in">Log In</a>
        </div>
    </nav>
</header>

<main class="login-page">

    <div class="login-card">

        <div class="login-header">
            <h1>Welcome back</h1>
            <p>Sign in to manage your bookings and miles</p>
        </div>

        <div class="login-tabs">
            <button class="login-tab active" onclick="switchTab('email', this)">Email</button>
            <button class="login-tab" onclick="switchTab('booking', this)">Booking Reference</button>
        </div>

        <!-- Email Login -->
        <form class="login-form" id="email-form">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrap">
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                    <button type="button" class="show-pass" onclick="togglePassword()">Show</button>
                </div>
            </div>
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <!-- Booking Reference Login -->
        <form class="login-form hidden" id="booking-form" onsubmit="return false;">
            <div class="form-group">
                <label for="booking-ref">Booking reference</label>
                <input type="text" id="booking-ref" placeholder="e.g. AB1234" style="text-transform:uppercase;">
            </div>
            <div class="form-group">
                <label for="last-name">Last name</label>
                <input type="text" id="last-name" placeholder="As shown on your passport">
            </div>
            <button type="submit" class="login-btn" onclick="window.location.href='/home/loyaltypage.html'">Find Booking</button>
        </form>

        <div class="divider"><span>or</span></div>

        <div class="register-prompt">
            Don't have an account? <a href="/log_in/register.html">Create one</a>
        </div>

    </div>

</main>

<script>
    function switchTab(tab, el) {
        document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('email-form').classList.add('hidden');
        document.getElementById('booking-form').classList.add('hidden');
        document.getElementById(tab + '-form').classList.remove('hidden');
    }

    function togglePassword() {
        const input = document.getElementById('password');
        const btn = document.querySelector('.show-pass');
        if (input.type === 'password') {
            input.type = 'text';
            btn.textContent = 'Hide';
        } else {
            input.type = 'password';
            btn.textContent = 'Show';
        }
    }
</script>

</body>
</html>
