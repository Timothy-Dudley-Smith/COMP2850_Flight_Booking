<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Results</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<header class="header">
    <nav class="top-nav">
        <div class="left-nav">
            <div class="logo">
                <img src="/styles/Images/Logo.png" class="Airline_Logo">
                <img src="/styles/Images/Star_Alliance.jpg" class="Star_Alliance">
            </div>
        </div>

        <div class="center-nav">
            <a href="/">Home</a>
            <a href="/recommendations">Recommendations</a>
            <a href="/book">Book</a>
            <a href="/manage">Manage</a>
        </div>

        <div class="right-nav">
            <span class="lang">United Kingdom - EN</span>
            <a href="/log_in">Log In</a>
        </div>
    </nav>
</header>

<!-- main nav bar at top -->



<section class="results-top">
    <div class="filter">
        <label>Filter by:</label>
        <div class="dropdown">
            <select>
                <option>All flights</option>
            </select>
        </div>
    </div>


    <div class="results-header">
        <h1 id="route-title"></h1>
        <p id="route-date"></p>
    </div>

    <div class="sort">
        <label>Sort by:</label>
        <div class="dropdown">
            <select>
                <option>Recommended</option>
            </select>
        </div>
    </div>
</section>



<section class="results-wrapper">
    <div class="results-list" id="flight-list">
        <p>Loading flights...</p>
    </div>
</section>

<script>
    const params = new URLSearchParams(window.location.search);
    const from = params.get("from");
    const to   = params.get("to");
    const date = params.get("date");

    document.getElementById("route-title").textContent = from + " → " + to;
    if (date) {
        document.getElementById("route-date").textContent =
            new Date(date).toLocaleDateString("en-GB", { day: "numeric", month: "long" });
    }

    const query = new URLSearchParams();
    if (from) query.append("from", from);
    if (to)   query.append("to",   to);
    if (date) query.append("date", date);

    fetch(`/api/flights?${query.toString()}`)
        .then(res => res.json())
        .then(flights => {
            const list = document.getElementById("flight-list");
            list.innerHTML = "";

            if (flights.length === 0) {
                list.innerHTML = "<p>No flights found for this route.</p>";
                return;
            }

            flights.forEach(flight => {
                const hours   = Math.floor(flight.length);
                const minutes = Math.round((flight.length % 1) * 60);

                list.insertAdjacentHTML("beforeend", `
                    <div class="flight-card">
                        <img src="/styles/Images/Logo.png" class="flight-logo">
                        <div class="flight-details">
                            <div class="time-block">
                                <h2>${flight.departureTime}</h2>
                                <span>${flight.departureAirport}</span>
                            </div>
                            <div class="duration-line">
                                <small>Direct</small>
                                <hr>
                                <small>${hours}h ${minutes}m</small>
                            </div>
                            <div class="time-block">
                                <h2>${flight.arrivalTime}</h2>
                                <span>${flight.arrivalAirport}</span>
                            </div>
                            <div class="price-block">
                                <small>Economy from</small>
                                <div class="price">£${flight.price.toFixed(2)}</div>
                            </div>
                        </div>
                    </div>`);
            });
        })
        .catch(() => {
            document.getElementById("flight-list").innerHTML =
                "<p>Failed to load flights. Please try again.</p>";
        });
</script>



</body>
</html>
