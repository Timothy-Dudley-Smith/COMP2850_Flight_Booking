<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<header class="header">
    <nav class="top-nav">
        <div class="left-nav">
            <div class="logo">
                <img src="/styles/Images/Logo.png" class="Airline_Logo">
                <img src="/styles/Images/Star_Alliance.jpg" class="Star_Alliance">
            </div>
        </div>

        <div class="center-nav">
            <a href="/">Home</a>
            <a href="/recommendations">Recommendations</a>
            <a href="/book">Book</a>
            <a href="/manage">Manage</a>
        </div>

        <div class="right-nav">
            <span class="lang">United Kingdom - EN</span>
            <a href="/log_in">Log In</a>
        </div>
    </nav>
</header>

<section class="flights-overview-header">
    <div class="flights-overview">
        <h1 id="route-title">Payment</h1>
        <p id="route-date">Complete your booking</p>
    </div>
</section>

<section style="max-width: 1100px; margin: 30px auto; padding: 0 20px;">
    <div style="display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 30px; align-items: start;">

        <!-- PAYMENT FORM -->
        <div class="booking_page_1">
            <h2>Payment details</h2>
            <p class="age-label">Enter your card information</p>

            <div class="user_input_box">
                <label>Cardholder name</label>
                <input type="text" id="cardholder-name">
            </div>

            <div class="user_input_box">
                <label>Card number</label>
                <input type="text" id="card-number" maxlength="16" placeholder="1234123412341234">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
                <div class="user_input_box">
                    <label>Expiry month</label>
                    <input type="number" id="expiry-month" min="1" max="12" placeholder="MM">
                </div>

                <div class="user_input_box">
                    <label>Expiry year</label>
                    <input type="number" id="expiry-year" min="2026" max="2100" placeholder="YYYY">
                </div>

                <div class="user_input_box">
                    <label>CVV</label>
                    <input type="text" id="cvv" maxlength="4" placeholder="123">
                </div>
            </div>

            <div class="user_input_box">
                <label>Billing address</label>
                <input type="text" id="billing-address">
            </div>

            <p id="payment-message" style="margin-top: 10px; font-weight: 600;"></p>

            <button class="continue-btn" id="pay-btn">Pay now</button>
        </div>

        <!-- BOOKING SUMMARY -->
        <div class="booking_page_1">
            <h2>Booking summary</h2>

            <div class="user_input_box">
                <label>Route</label>
                <p id="summary-route">Not available</p>
            </div>

            <div class="user_input_box">
                <label>Date</label>
                <p id="summary-date">Not available</p>
            </div>

            <div class="user_input_box">
                <label>Passengers</label>
                <p id="summary-passengers">Not available</p>
            </div>

            <div class="user_input_box">
                <label>Seat</label>
                <p id="summary-seat">Not selected yet</p>
            </div>

            <div class="user_input_box">
                <label>Loyalty</label>
                <p id="summary-loyalty">Not selected yet</p>
            </div>

            <div class="user_input_box">
                <label>Total</label>
                <p id="summary-total">To be confirmed</p>
            </div>
        </div>

    </div>
</section>

<script>
    const params = new URLSearchParams(window.location.search);

    const from = params.get("from");
    const to = params.get("to");
    const date = params.get("date");
    const passengers = params.get("passengers");

    const selectedSeat = sessionStorage.getItem("selectedSeat");
    const loyaltyChoice = sessionStorage.getItem("loyaltyChoice");
    const bookingDataRaw = sessionStorage.getItem("bookingData");

    let bookingData = null;
    if (bookingDataRaw) {
        bookingData = JSON.parse(bookingDataRaw);
    }

    document.getElementById("summary-route").textContent =
        bookingData ? `${bookingData.from} → ${bookingData.to}` :
            (from && to ? `${from} → ${to}` : "Not available");

    document.getElementById("summary-date").textContent =
        bookingData ? new Date(bookingData.date).toLocaleDateString("en-GB") :
            (date ? new Date(date).toLocaleDateString("en-GB") : "Not available");

    document.getElementById("summary-passengers").textContent =
        bookingData ? bookingData.passengers :
            (passengers ? passengers : "Not available");

    document.getElementById("summary-seat").textContent =
        selectedSeat ? selectedSeat : "Not selected yet";

    document.getElementById("summary-loyalty").textContent =
        loyaltyChoice ? loyaltyChoice : "Not selected yet";

    document.getElementById("summary-total").textContent =
        bookingData && bookingData.price ? bookingData.price : "To be confirmed";

    document.getElementById("pay-btn").addEventListener("click", async function () {

        const name = document.getElementById("cardholder-name").value.trim();
        const number = document.getElementById("card-number").value.trim();
        const month = parseInt(document.getElementById("expiry-month").value);
        const year = parseInt(document.getElementById("expiry-year").value);
        const cvv = document.getElementById("cvv").value.trim();
        const address = document.getElementById("billing-address").value.trim();
        const message = document.getElementById("payment-message");

        message.textContent = "";

        if (name === "") {
            message.textContent = "Enter cardholder name.";
            return;
        }

        if (!/^\d{16}$/.test(number)) {
            message.textContent = "Card number must be 16 digits.";
            return;
        }

        if (!/^\d{3,4}$/.test(cvv)) {
            message.textContent = "Invalid CVV.";
            return;
        }

        if (month < 1 || month > 12) {
            message.textContent = "Invalid expiry month.";
            return;
        }

        if (year < 2026) {
            message.textContent = "Card expired.";
            return;
        }

        if (address === "") {
            message.textContent = "Enter billing address.";
            return;
        }

        try {
            const res = await fetch("/api/payment", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    cardholderName: name,
                    cardNumber: number,
                    expiryMonth: month,
                    expiryYear: year,
                    cvv: cvv,
                    billingAddress: address
                })
            });

            const result = await res.json();

            if (result.success) {
                message.textContent = "Payment successful.";
                // window.location.href = "confirmation.html";
            } else {
                message.textContent = result.message;
            }

        } catch {
            message.textContent = "Payment failed. Try again.";
        }
    });
</script>

</body>
</html>
